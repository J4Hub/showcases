<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Showcases</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-decoration: none;
            color: #333;
            display: block;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .card h3 {
            color: #0366d6;
            margin-bottom: 8px;
            font-size: 18px;
        }
        .card p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MVP Showcases</h1>
        <div id="showcases"></div>
    </div>

    <script>
        const showcases = [
            { name: 'نمونه ۱', file: 'نمونه1.html', desc: 'توضیح کوتاه درباره این پروژه' },
            // فایل‌های بیشتر را اینجا اضافه کنید:
            // { name: 'نمونه ۲', file: 'نمونه2.html', desc: 'توضیح' },
        ];

        const container = document.getElementById('showcases');
        showcases.forEach(item => {
            const link = document.createElement('a');
            link.href = `mvp/${item.file}`;
            link.className = 'card';
            link.innerHTML = `
                <h3>${item.name}</h3>
                <p>${item.desc}</p>
            `;
            container.appendChild(link);
        });
    </script>
</body>
</html>
