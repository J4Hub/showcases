<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J4 — MVP Showcases</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #d8d4cc;
            color: #2a2824;
            min-height: 100vh;
            padding: 80px 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 48px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            color: #1a1814;
        }
        .header p {
            color: #6b675f;
            font-size: 15px;
            font-weight: 400;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .card {
            background: #e8e4dc;
            border: 1px solid #c4c0b8;
            border-radius: 10px;
            padding: 18px 20px;
            text-decoration: none;
            color: #2a2824;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .card:hover {
            background: #f0ece4;
            border-color: #b0aca4;
            transform: translateX(-2px);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .card-name {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.3;
        }

        .card-desc {
            color: #6b675f;
            font-size: 13px;
            font-weight: 400;
        }

        .card-arrow {
            color: #8a857d;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .card-arrow svg {
            width: 16px;
            height: 16px;
        }
        .card:hover .card-arrow {
            color: #2a2824;
            transform: translateX(-4px);
        }

        @media (max-width: 600px) {
            body { padding: 60px 16px; }
            .header h1 { font-size: 26px; }
            .header p { font-size: 14px; }
            .card { padding: 16px 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MVP Showcases</h1>
            <p>روی هر کدوم کلیک کنید</p>
        </div>

        <div class="grid" id="showcases"></div>
    </div>

    <script>
        const showcases = [
            { name: 'نمونه ۱', file: 'نمونه1.html', desc: 'Prototype 1' },
            { name: 'نمونه 2', file: 'نمونه2.html', desc: 'Prototype 2' },
            { name: 'نمونه 3', file: 'نمونه3.html', desc: 'Prototype 3' },
            { name: 'نمونه 4', file: 'نمونه4.html', desc: 'Prototype 4' },
            { name: 'نمونه 5', file: 'نمونه5.html', desc: 'Prototype 5' },
            { name: 'نمونه 6', file: 'نمونه6.html', desc: 'Prototype 6' },
            { name: 'نمونه 7', file: 'نمونه7.html', desc: 'Prototype 7' },
            // فایل‌های بیشتر را اینجا اضافه کنید:
            // { name: 'نمونه ۲', file: 'نمونه2.html', desc: 'توضیح پروژه دوم' },
        ];

        const container = document.getElementById('showcases');
        showcases.forEach(item => {
            const link = document.createElement('a');
            link.href = `mvp/${item.file}`;
            link.className = 'card';
            link.innerHTML = `
                <div class="card-info">
                    <span class="card-name">${item.name}</span>
                    <span class="card-desc">${item.desc}</span>
                </div>
                <span class="card-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </span>
            `;
            container.appendChild(link);
        });
    </script>
</body>
</html>
