<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Showcases</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf3 100%);
            min-height: 100vh;
            padding: 60px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.6s ease;
        }
        .header h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .header p {
            color: #666;
            font-size: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 28px;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            animation: fadeInUp 0.6s ease backwards;
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.15);
        }
        .card:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }
        .card h3 {
            font-size: 20px;
            font-weight: 600;
            color: #222;
            margin-bottom: 10px;
        }
        .card p {
            color: #777;
            font-size: 14px;
            line-height: 1.6;
        }
        .card-arrow {
            position: absolute;
            top: 28px;
            left: 28px;
            color: #667eea;
            font-size: 20px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }
        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MVP Showcases</h1>
            <p>مجموعه‌ای از پروژه‌ها و ایده‌های من</p>
        </div>
        
        <!-- ═══════════════════════════════════════════════════════ -->
        <!-- SHOWCASES REGION - Add your projects here -->
        <!-- ═══════════════════════════════════════════════════════ -->
        <div class="grid" id="showcases"></div>
        <!-- ═══════════════════════════════════════════════════════ -->
        
    </div>

    <script>
        const showcases = [
            { name: 'نمونه ۱', file: 'نمونه1.html', desc: 'یک نمونه اولیه ساده با 2 تم دارک و لایت' },
            // فایل‌های بیشتر را اینجا اضافه کنید:
            // { name: 'نمونه ۲', file: 'نمونه2.html', desc: 'توضیح پروژه دوم' },
        ];

        const container = document.getElementById('showcases');
        showcases.forEach(item => {
            const link = document.createElement('a');
            link.href = `mvp/${item.file}`;
            link.className = 'card';
            link.innerHTML = `
                <span class="card-arrow">←</span>
                <h3>${item.name}</h3>
                <p>${item.desc}</p>
            `;
            container.appendChild(link);
        });
    </script>
</body>
</html>
